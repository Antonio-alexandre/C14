name: Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Setup python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      - name: Rodar testes e gerar relatório
        run: |
          PYTHONPATH=. python -m pytest \
          --html=report.html \
          --self-contained-html \
          --cov=app \
          --cov-report=html

      - name: Upload relatório de teste
        uses: actions/upload-artifact@v4
        with:
          name: test-report
          path: report.html
        
      - name: Upload cobertura de testes
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/